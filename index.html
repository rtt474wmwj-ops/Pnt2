<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Puntuación DOS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f0f2f5;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px;
            color: #1a2634;
            position: relative;
        }
        .screen {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px 16px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.10);
        }
        .footer-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.7rem;
            color: #6c757d;
            background: rgba(255,255,255,0.9);
            padding: 4px 12px;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            z-index: 999;
            pointer-events: none;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .footer-info .version {
            font-weight: 600;
        }
        .footer-info .copyright {
            color: #6c757d;
        }
        h1, h2, h3 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 600;
        }
        h1 { font-size: 2rem; }
        h2 { font-size: 1.6rem; }
        h3 { font-size: 1.3rem; }
        label {
            display: block;
            font-weight: 500;
            margin: 14px 0 6px;
            color: #2d3e50;
            font-size: 1.1rem;
        }
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            font-size: 1.1rem;
            background: #fafbfc;
            transition: border 0.2s;
        }
        select:focus, input:focus {
            border-color: #007bff;
            outline: none;
            background: #ffffff;
        }
        #namesContainer input {
            margin-bottom: 8px;
        }
        button {
            padding: 14px 20px;
            margin: 6px 4px;
            border: none;
            border-radius: 14px;
            background: #007bff;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            min-height: 54px;
            min-width: 48px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        button:active { transform: scale(0.95); }
        button.secondary { background: #6c757d; }
        button.secondary:active { background: #5a6268; }
        button.success { background: #28a745; }
        button.success:active { background: #218838; }
        button.danger { background: #dc3545; }
        button.danger:active { background: #c82333; }
        button.warning { background: #ffc107; color: #212529; }
        button.warning:active { background: #e0a800; }
        button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        #gameButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 18px 0 10px;
        }
        #gameButtons button {
            flex: 1 1 120px;
            min-width: 100px;
        }
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            margin: 12px 0;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            /* Ajuste para mostrar 3 columnas de rondas */
            max-width: 100%;
        }
        .puntos-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 1rem;
            table-layout: fixed;
            min-width: 400px;
        }
        .puntos-table th,
        .puntos-table td {
            padding: 8px 6px;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
            vertical-align: middle;
            background: #ffffff;
        }
        .puntos-table th {
            background: #f1f3f5;
            font-weight: 600;
            color: #1a2634;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        /* Columna fija: Jugador (izquierda) */
        .puntos-table th:first-child,
        .puntos-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 3;
            background: #ffffff;
            min-width: 100px;
            max-width: 130px;
            word-break: break-word;
            white-space: normal;
            font-weight: 600;
        }
        .puntos-table th:first-child {
            background: #f1f3f5;
            z-index: 4;
        }

        /* Columnas de rondas (ancho fijo para que quepan 3) */
        .puntos-table th:not(:first-child):not(:last-child),
        .puntos-table td:not(:first-child):not(:last-child) {
            width: 80px;
            min-width: 70px;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Columna fija: Ganador (derecha) */
        .puntos-table th:last-child,
        .puntos-table td:last-child {
            position: sticky;
            right: 0;
            z-index: 3;
            background: #ffffff;
            min-width: 70px;
            max-width: 80px;
        }
        .puntos-table th:last-child {
            background: #f1f3f5;
            z-index: 4;
        }

        .puntos-table tr.winner td:first-child::before {
            content: "👑 ";
            font-size: 1.1rem;
        }
        .puntos-table .ronda-header {
            font-size: 0.75rem;
            color: #6c757d;
            font-weight: 400;
        }
        .puntos-table .total-puntos {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .puntos-table .inc-puntos {
            font-size: 0.55rem;
            color: #28a745;
            display: block;
            margin-top: -4px;
        }
        .puntos-table .inc-puntos.cero {
            color: #6c757d;
        }
        .puntos-table .inc-puntos.negativo {
            color: #dc3545;
        }

        .winner-btn {
            background: transparent;
            border: 1px solid #ced4da;
            border-radius: 10px;
            padding: 4px 8px;
            font-size: 1.5rem;
            min-height: 38px;
            min-width: 38px;
            cursor: pointer;
            transition: background 0.1s;
            background: #f8f9fa;
        }
        .winner-btn.active {
            background: #ffd700;
            border-color: #ffb300;
            box-shadow: 0 0 0 2px #ffb300;
        }
        .winner-btn:active { transform: scale(0.92); }

        #statusMessage {
            text-align: center;
            margin: 14px 0 4px;
            font-weight: 500;
            color: #2d3e50;
            font-size: 1rem;
            min-height: 2.2em;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 12px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 12px;
        }
        .modal-content {
            background: white;
            padding: 20px 16px;
            border-radius: 24px;
            max-width: 550px;
            width: 100%;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .close {
            position: absolute;
            top: 8px;
            right: 16px;
            font-size: 36px;
            line-height: 1;
            cursor: pointer;
            color: #6c757d;
            background: none;
            border: none;
            padding: 0 8px;
            min-height: auto;
            box-shadow: none;
        }
        .close:active { color: #1a2634; }

        .score-input-group {
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid #e9ecef;
        }
        .score-input-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .score-input-group label {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .score-input-group input[type="number"] {
            width: 120px;
            display: inline-block;
            margin-right: 8px;
            font-size: 1.2rem;
            padding: 12px;
        }
        .cartas-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            position: relative;
        }
        .carta-btn {
            background: white;
            border: 1px solid #ced4da;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 1.4rem;
            font-weight: 600;
            min-width: 52px;
            min-height: 52px;
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
            background: #fafbfc;
            position: relative;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .carta-btn:active {
            transform: scale(0.90);
            background: #e2e6ea;
        }
        .carta-btn .subvalor {
            font-size: 0.65rem;
            font-weight: 400;
            color: #6c757d;
        }
        .carta-btn .contador {
            font-size: 0.55rem;
            font-weight: 700;
            color: #007bff;
            background: #e9ecef;
            padding: 0 4px;
            border-radius: 8px;
            margin-top: 1px;
            min-width: 16px;
            text-align: center;
        }
        .carta-btn .flotante {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, top 0.2s;
        }
        .carta-btn .flotante.mostrar {
            opacity: 1;
            top: -38px;
        }
        .carta-btn .flotante.restar {
            background: #dc3545;
        }
        .carta-btn .flotante.cero {
            background: #6c757d;
        }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal-actions button {
            flex: 1 1 120px;
            min-width: 100px;
        }

        .final-table {
            margin: 16px 0;
        }
        .final-table th, .final-table td {
            padding: 10px 8px;
            font-size: 1.1rem;
        }
        .final-table tr:first-child {
            background: #ffd700;
            font-weight: 700;
        }
        .final-table tr:last-child {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 480px) {
            body { padding: 8px; font-size: 16px; }
            .screen { padding: 16px 12px; }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.4rem; }
            h3 { font-size: 1.2rem; }
            button { font-size: 1rem; padding: 12px 14px; min-height: 48px; }
            select, input[type="text"], input[type="number"] { font-size: 1rem; padding: 12px; }
            .carta-btn { font-size: 1.2rem; min-width: 44px; min-height: 44px; padding: 6px 10px; }
            .carta-btn .subvalor { font-size: 0.55rem; }
            .carta-btn .contador { font-size: 0.5rem; }
            .winner-btn { font-size: 1.3rem; min-height: 36px; min-width: 36px; padding: 2px 6px; }

            .puntos-table { font-size: 0.9rem; min-width: 340px; }
            .puntos-table th, .puntos-table td { padding: 6px 3px; }

            .puntos-table th:first-child,
            .puntos-table td:first-child {
                min-width: 80px;
                max-width: 100px;
                font-size: 0.85rem;
            }

            .puntos-table th:not(:first-child):not(:last-child),
            .puntos-table td:not(:first-child):not(:last-child) {
                width: 65px;
                min-width: 55px;
                font-size: 0.8rem;
            }

            .puntos-table .total-puntos {
                font-size: 0.85rem;
            }
            .puntos-table .inc-puntos {
                font-size: 0.5rem;
            }

            .footer-info { font-size: 0.6rem; padding: 2px 8px; }
        }
        @media (max-width: 380px) {
            #gameButtons button { flex: 1 1 80px; min-width: 70px; font-size: 0.9rem; }
            .cartas-container { gap: 4px; }
            .carta-btn { font-size: 1rem; min-width: 38px; min-height: 38px; padding: 4px 6px; }
            .puntos-table { min-width: 300px; }
            .puntos-table th:first-child,
            .puntos-table td:first-child {
                min-width: 70px;
                max-width: 85px;
                font-size: 0.8rem;
            }
            .puntos-table th:not(:first-child):not(:last-child),
            .puntos-table td:not(:first-child):not(:last-child) {
                width: 55px;
                min-width: 48px;
                font-size: 0.75rem;
            }
            .puntos-table .total-puntos { font-size: 0.8rem; }
            .puntos-table .inc-puntos { font-size: 0.45rem; }
        }
    </style>
</head>
<body>

    <!-- Pie de página con versión y copyright -->
    <div class="footer-info">
        <span class="version">v.0.2.5</span>
        <span class="copyright">© 2026 · Todos los derechos reservados</span>
    </div>

    <div id="setup" class="screen">
        <h1>🎯 Puntuación DOS</h1>
        <label for="numPlayers">Número de jugadores (máx. 4):</label>
        <select id="numPlayers">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
        </select>
        <label for="puntuacionFinal">Puntuación final (al alcanzarla, termina):</label>
        <input type="number" id="puntuacionFinal" value="200" min="50" step="10">
        <div id="namesContainer"></div>
        <button id="startGame" class="success" style="margin-top:14px; width:100%;">▶ Empezar partida</button>
    </div>

    <div id="game" class="screen" style="display:none;">
        <h2>📊 Puntuaciones por rondas</h2>
        <div class="table-wrap" id="tableWrap">
            <table class="puntos-table" id="scoreTable">
                <thead id="tableHead"></thead>
                <tbody id="scoreBody"></tbody>
            </table>
        </div>
        <div id="gameButtons">
            <button id="newRound" class="secondary">🔄 Nueva Ronda</button>
            <button id="scoreButton" class="success">➕ Puntuar</button>
            <button id="undoButton" class="danger">↩ Deshacer</button>
            <button id="resetScoresBtn" class="warning">🔄 Resetear Puntos</button>
            <button id="restartGameBtn" class="secondary">🏠 Reiniciar Partida</button>
        </div>
        <div id="statusMessage">🎮 ¡Partida iniciada!</div>
    </div>

    <div id="scorePanel" class="modal" style="display:none;">
        <div class="modal-content">
            <button class="close" id="closeModalBtn">&times;</button>
            <h3>✏️ Puntuar ronda</h3>
            <div id="scoreInputs"></div>
            <div class="modal-actions">
                <button id="cancelScore" class="secondary">Cancelar</button>
                <button id="applyScore" class="success">✔ Aceptar</button>
            </div>
        </div>
    </div>

    <div id="finalPanel" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>🏆 ¡Partida finalizada!</h2>
            <div id="finalResult"></div>
            <button id="resetGame" class="warning" style="width:100%; margin-top:16px;">🔄 Reiniciar partida</button>
        </div>
    </div>

    <script>
    (function() {
        "use strict";

        // ============================================================
        //  ESTADO
        // ============================================================
        let players = [];
        let currentWinner = null;
        let history = [];
        let gameFinished = false;
        let puntuacionFinal = 200;
        let rondaActual = 0;

        // ============================================================
        //  DOM REFERENCIAS
        // ============================================================
        const setupScreen = document.getElementById('setup');
        const gameScreen = document.getElementById('game');
        const numPlayersSelect = document.getElementById('numPlayers');
        const puntuacionFinalInput = document.getElementById('puntuacionFinal');
        const namesContainer = document.getElementById('namesContainer');
        const startGameBtn = document.getElementById('startGame');
        const tableHead = document.getElementById('tableHead');
        const scoreBody = document.getElementById('scoreBody');
        const tableWrap = document.getElementById('tableWrap');
        const newRoundBtn = document.getElementById('newRound');
        const scoreButton = document.getElementById('scoreButton');
        const undoButton = document.getElementById('undoButton');
        const resetScoresBtn = document.getElementById('resetScoresBtn');
        const restartGameBtn = document.getElementById('restartGameBtn');
        const statusMessage = document.getElementById('statusMessage');
        const scorePanel = document.getElementById('scorePanel');
        const scoreInputs = document.getElementById('scoreInputs');
        const applyScoreBtn = document.getElementById('applyScore');
        const cancelScoreBtn = document.getElementById('cancelScore');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const finalPanel = document.getElementById('finalPanel');
        const finalResult = document.getElementById('finalResult');
        const resetGameBtn = document.getElementById('resetGame');

        // ============================================================
        //  GUARDAR / CARGAR ESTADO (localStorage)
        // ============================================================
        function saveState() {
            const state = {
                players: players,
                currentWinner: currentWinner,
                history: history,
                gameFinished: gameFinished,
                puntuacionFinal: puntuacionFinal,
                rondaActual: rondaActual,
                gameStarted: (setupScreen.style.display === 'none')
            };
            try {
                localStorage.setItem('puntuacionDosState', JSON.stringify(state));
            } catch(e) {}
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('puntuacionDosState');
                if (!raw) return false;
                const state = JSON.parse(raw);
                if (!state.players || state.players.length === 0) return false;

                players = state.players;
                currentWinner = state.currentWinner;
                history = state.history || [];
                gameFinished = state.gameFinished || false;
                puntuacionFinal = state.puntuacionFinal || 200;
                rondaActual = state.rondaActual || 0;

                if (state.gameStarted) {
                    setupScreen.style.display = 'none';
                    gameScreen.style.display = 'block';
                    renderGame();
                    updateStatus();
                    return true;
                }
                return false;
            } catch(e) {
                return false;
            }
        }

        function clearState() {
            localStorage.removeItem('puntuacionDosState');
        }

        // ============================================================
        //  FUNCIONES AUXILIARES
        // ============================================================
        function updateStatus() {
            if (gameFinished) {
                statusMessage.textContent = '⛔ Partida finalizada. Reinicia para jugar de nuevo.';
                return;
            }
            if (currentWinner !== null && players[currentWinner]) {
                statusMessage.textContent = '👑 Ganador de la ronda actual: ' + players[currentWinner].nombre;
            } else {
                statusMessage.textContent = '⚪ Sin ganador seleccionado para la ronda actual.';
            }
        }

        function checkGameEnd() {
            if (gameFinished) return true;
            for (let i = 0; i < players.length; i++) {
                if (players[i].puntos >= puntuacionFinal) {
                    return true;
                }
            }
            return false;
        }

        function showFinalPanel() {
            gameFinished = true;
            newRoundBtn.disabled = true;
            scoreButton.disabled = true;
            undoButton.disabled = true;
            resetScoresBtn.disabled = true;

            const sorted = players.slice().sort((a, b) => a.puntos - b.puntos);

            let html = '<div class="table-wrap"><table class="final-table"><thead><tr><th>Posición</th><th>Jugador</th><th>Puntos</th></tr></thead><tbody>';
            for (let i = 0; i < sorted.length; i++) {
                const p = sorted[i];
                let medal = '';
                if (i === 0) medal = '🥇 (¡GANADOR!)';
                else if (i === 1) medal = '🥈';
                else if (i === 2) medal = '🥉';
                else medal = (i+1) + '.';
                html += '<tr><td>' + medal + '</td><td>' + p.nombre + '</td><td>' + p.puntos + '</td></tr>';
            }
            html += '</tbody></table></div>';
            html += '<p style="text-align:center; font-weight:500;">🎯 Puntuación final: ' + puntuacionFinal + ' puntos</p>';
            finalResult.innerHTML = html;
            finalPanel.style.display = 'flex';
            statusMessage.textContent = '🏁 ¡Partida finalizada! Revisa la tabla.';
            saveState();
        }

        // ============================================================
        //  RENDERIZAR TABLA DE PUNTUACIONES POR RONDAS
        // ============================================================
        function renderGame() {
            // Determinar número total de rondas
            let maxRondas = 0;
            for (let p of players) {
                if (p.historialPuntos && p.historialPuntos.length > maxRondas) {
                    maxRondas = p.historialPuntos.length;
                }
            }

            // Construir cabecera con todas las rondas
            let theadHTML = '<tr><th>Jugador</th>';
            for (let r = 0; r < maxRondas; r++) {
                theadHTML += `<th>Ronda ${r+1}</th>`;
            }
            theadHTML += '<th>Ganador</th></tr>';
            tableHead.innerHTML = theadHTML;

            // Cuerpo de la tabla
            let tbodyHTML = '';
            for (let i = 0; i < players.length; i++) {
                const p = players[i];
                const isWinner = (currentWinner === i);
                let rowClass = isWinner ? 'winner' : '';
                tbodyHTML += `<tr class="${rowClass}"><td>${p.nombre}</td>`;
                const historial = p.historialPuntos || [];
                for (let r = 0; r < maxRondas; r++) {
                    if (r < historial.length) {
                        const total = historial[r];
                        let inc = 0;
                        if (r === 0) inc = total;
                        else inc = total - historial[r-1];
                        let incClass = '';
                        let incText = '';
                        if (inc > 0) { incClass = ''; incText = '+' + inc; }
                        else if (inc === 0) { incClass = 'cero'; incText = '+0'; }
                        else { incClass = 'negativo'; incText = inc.toString(); }
                        tbodyHTML += `<td><span class="total-puntos">${total}</span><span class="inc-puntos ${incClass}">${incText}</span></td>`;
                    } else {
                        tbodyHTML += `<td>—</td>`;
                    }
                }
                // Columna Ganador
                const winnerBtn = `<td><button class="winner-btn ${isWinner ? 'active' : ''}" data-player-index="${i}" ${gameFinished ? 'disabled' : ''}>${isWinner ? '👑' : '⬜'}</button></td>`;
                tbodyHTML += winnerBtn;
                tbodyHTML += '</tr>';
            }
            scoreBody.innerHTML = tbodyHTML;

            // Asignar eventos a los botones de ganador
            document.querySelectorAll('.winner-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (gameFinished) return;
                    const idx = parseInt(this.dataset.playerIndex);
                    toggleWinner(idx);
                });
            });

            // Scroll al final (última columna) para mostrar las 3 rondas más recientes
            if (tableWrap && maxRondas > 0) {
                setTimeout(() => {
                    tableWrap.scrollLeft = tableWrap.scrollWidth;
                }, 50);
            }

            updateStatus();
            saveState();
        }

        function toggleWinner(index) {
            if (gameFinished) return;
            if (currentWinner === index) {
                currentWinner = null;
            } else {
                currentWinner = index;
            }
            renderGame();
        }

        // ============================================================
        //  SETUP
        // ============================================================
        function setupNames() {
            const num = parseInt(numPlayersSelect.value);
            namesContainer.innerHTML = '';
            for (let i = 0; i < num; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'Nombre del jugador ' + (i + 1);
                input.id = 'name-' + i;
                input.autocomplete = 'off';
                namesContainer.appendChild(input);
            }
        }
        numPlayersSelect.addEventListener('change', setupNames);
        setupNames();

        startGameBtn.addEventListener('click', function() {
            const inputs = namesContainer.querySelectorAll('input');
            const names = [];
            let valid = true;
            for (let i = 0; i < inputs.length; i++) {
                const val = inputs[i].value.trim();
                if (val === '') {
                    valid = false;
                    inputs[i].style.borderColor = 'red';
                } else {
                    inputs[i].style.borderColor = '';
                    names.push(val);
                }
            }
            if (!valid) {
                alert('Por favor, introduce todos los nombres.');
                return;
            }
            const final = parseInt(puntuacionFinalInput.value);
            if (isNaN(final) || final < 10) {
                alert('Introduce una puntuación final válida (mínimo 10).');
                return;
            }
            puntuacionFinal = final;

            players = [];
            for (let j = 0; j < names.length; j++) {
                players.push({
                    nombre: names[j],
                    puntos: 0,
                    historialPuntos: []
                });
            }
            currentWinner = null;
            history = [];
            gameFinished = false;
            rondaActual = 0;
            setupScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            newRoundBtn.disabled = false;
            scoreButton.disabled = false;
            undoButton.disabled = false;
            resetScoresBtn.disabled = false;
            renderGame();
            statusMessage.textContent = '🎮 ¡Partida iniciada!';
            saveState();
        });

        // ============================================================
        //  NUEVA RONDA
        // ============================================================
        newRoundBtn.addEventListener('click', function() {
            if (gameFinished) return;
            currentWinner = null;
            renderGame();
            statusMessage.textContent = '🔄 Nueva ronda. Selecciona un ganador y puntúa.';
        });

        // ============================================================
        //  ABRIR PANEL DE PUNTUACIÓN
        // ============================================================
        function openScorePanel() {
            if (gameFinished) return;
            const toScore = [];
            for (let i = 0; i < players.length; i++) {
                if (i !== currentWinner) {
                    toScore.push({ nombre: players[i].nombre, index: i });
                }
            }

            if (toScore.length === 0) {
                alert('No hay jugadores para puntuar.');
                return;
            }

            scoreInputs.innerHTML = '';
            for (let j = 0; j < toScore.length; j++) {
                const p = toScore[j];
                const group = document.createElement('div');
                group.className = 'score-input-group';

                const label = document.createElement('label');
                label.textContent = p.nombre;

                const input = document.createElement('input');
                input.type = 'number';
                input.min = 0;
                input.value = 0;
                input.id = 'score-' + p.index;
                input.inputMode = 'numeric';
                input.autocomplete = 'off';

                const cartasContainer = document.createElement('div');
                cartasContainer.className = 'cartas-container';

                const cartas = [1, 3, 4, 5, 6, 7, 8, 9, 10, '2', '#'];
                const valores = {};
                cartas.forEach(function(c) {
                    if (c === '2') valores[c] = 20;
                    else if (c === '#') valores[c] = 40;
                    else valores[c] = c;
                });

                cartas.forEach(function(c) {
                    const valor = valores[c];
                    const etiqueta = c.toString();
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'carta-btn';

                    let contador = 0;

                    const spanValor = document.createElement('span');
                    spanValor.className = 'subvalor';
                    spanValor.textContent = valor;

                    const spanContador = document.createElement('span');
                    spanContador.className = 'contador';
                    spanContador.textContent = '0';

                    const topDiv = document.createElement('div');
                    topDiv.style.display = 'flex';
                    topDiv.style.flexDirection = 'column';
                    topDiv.style.alignItems = 'center';
                    topDiv.innerHTML = etiqueta;
                    topDiv.appendChild(spanValor);
                    topDiv.appendChild(spanContador);

                    btn.appendChild(topDiv);

                    const flotante = document.createElement('span');
                    flotante.className = 'flotante';
                    flotante.textContent = '+' + valor;
                    btn.appendChild(flotante);

                    let timeoutId = null;
                    let isLongPress = false;

                    function actualizarContador() {
                        spanContador.textContent = contador;
                    }

                    function mostrarFlotante(texto, tipo) {
                        flotante.textContent = texto;
                        flotante.className = 'flotante';
                        if (tipo === 'restar') flotante.classList.add('restar');
                        else if (tipo === 'cero') flotante.classList.add('cero');
                        else flotante.classList.add('mostrar');
                        void flotante.offsetWidth;
                        flotante.classList.add('mostrar');
                        setTimeout(function() {
                            flotante.className = 'flotante';
                        }, 600);
                    }

                    btn.addEventListener('pointerdown', function(e) {
                        e.preventDefault();
                        isLongPress = false;
                        timeoutId = setTimeout(function() {
                            isLongPress = true;
                            if (contador > 0) {
                                contador--;
                                actualizarContador();
                                let current = parseInt(input.value) || 0;
                                current -= valor;
                                if (current < 0) current = 0;
                                input.value = current;
                                mostrarFlotante('-' + valor, 'restar');
                            } else {
                                mostrarFlotante('-0', 'cero');
                            }
                        }, 500);
                    });

                    btn.addEventListener('pointerup', function(e) {
                        e.preventDefault();
                        clearTimeout(timeoutId);
                        if (!isLongPress) {
                            contador++;
                            actualizarContador();
                            let current = parseInt(input.value) || 0;
                            current += valor;
                            input.value = current;
                            mostrarFlotante('+' + valor, 'sumar');
                        }
                        isLongPress = false;
                    });

                    btn.addEventListener('pointercancel', function() {
                        clearTimeout(timeoutId);
                        isLongPress = false;
                    });

                    cartasContainer.appendChild(btn);
                });

                group.appendChild(label);
                group.appendChild(input);
                group.appendChild(cartasContainer);
                scoreInputs.appendChild(group);
            }

            scorePanel.style.display = 'flex';
            const firstInput = scoreInputs.querySelector('input[type="number"]');
            if (firstInput) setTimeout(function() { firstInput.focus(); }, 100);
        }

        function closeScorePanel() {
            scorePanel.style.display = 'none';
        }

        scoreButton.addEventListener('click', openScorePanel);

        // ============================================================
        //  APLICAR PUNTUACIÓN
        // ============================================================
        applyScoreBtn.addEventListener('click', function() {
            if (gameFinished) {
                closeScorePanel();
                return;
            }

            const inputs = scoreInputs.querySelectorAll('input[type="number"]');
            const puntosPorJugador = {};

            for (let j = 0; j < inputs.length; j++) {
                const idx = parseInt(inputs[j].id.split('-')[1]);
                const val = parseInt(inputs[j].value) || 0;
                if (val < 0) {
                    alert('Los puntos no pueden ser negativos.');
                    return;
                }
                if (currentWinner !== idx) {
                    puntosPorJugador[idx] = val;
                }
            }

            // Aplicar puntos y guardar historial
            for (let k = 0; k < players.length; k++) {
                const puntos = puntosPorJugador[k] || 0;
                players[k].puntos += puntos;
                players[k].historialPuntos.push(players[k].puntos);
            }

            const puntosArray = [];
            for (let m = 0; m < players.length; m++) {
                puntosArray[m] = puntosPorJugador[m] || 0;
            }
            history.push({
                pointsAdded: puntosArray,
                winner: currentWinner
            });
            rondaActual++;

            closeScorePanel();
            renderGame();

            if (checkGameEnd()) {
                showFinalPanel();
            } else {
                statusMessage.textContent = '✅ Puntuación aplicada.';
            }
            saveState();
        });

        // ============================================================
        //  CERRAR MODAL
        // ============================================================
        cancelScoreBtn.addEventListener('click', closeScorePanel);
        closeModalBtn.addEventListener('click', closeScorePanel);
        scorePanel.addEventListener('click', function(e) {
            if (e.target === scorePanel) closeScorePanel();
        });

        // ============================================================
        //  DESHACER
        // ============================================================
        undoButton.addEventListener('click', function() {
            if (gameFinished) return;
            if (history.length === 0) {
                alert('No hay rondas para deshacer.');
                return;
            }
            const last = history.pop();
            for (let i = 0; i < last.pointsAdded.length; i++) {
                players[i].puntos -= last.pointsAdded[i];
                if (players[i].puntos < 0) players[i].puntos = 0;
                if (players[i].historialPuntos.length > 0) {
                    players[i].historialPuntos.pop();
                }
            }
            if (history.length > 0) {
                currentWinner = history[history.length - 1].winner;
            } else {
                currentWinner = null;
            }
            if (rondaActual > 0) rondaActual--;
            renderGame();
            statusMessage.textContent = '↩ Última ronda deshecha.';
            saveState();
        });

        // ============================================================
        //  RESETEAR PUNTUACIONES
        // ============================================================
        resetScoresBtn.addEventListener('click', function() {
            if (gameFinished) {
                if (!confirm('¿Resetear todas las puntuaciones a 0 y continuar?')) return;
                gameFinished = false;
                finalPanel.style.display = 'none';
                newRoundBtn.disabled = false;
                scoreButton.disabled = false;
                undoButton.disabled = false;
                resetScoresBtn.disabled = false;
            } else {
                if (!confirm('¿Resetear todas las puntuaciones a 0? Se perderá el historial.')) return;
            }
            for (let i = 0; i < players.length; i++) {
                players[i].puntos = 0;
                players[i].historialPuntos = [];
            }
            currentWinner = null;
            history = [];
            gameFinished = false;
            rondaActual = 0;
            renderGame();
            statusMessage.textContent = '🔄 Puntuaciones reseteadas a 0.';
            saveState();
        });

        // ============================================================
        //  REINICIAR PARTIDA
        // ============================================================
        function restartGame() {
            if (!confirm('¿Reiniciar partida? Se perderán todos los datos.')) return;
            clearState();
            setupScreen.style.display = 'block';
            gameScreen.style.display = 'none';
            finalPanel.style.display = 'none';
            players = [];
            currentWinner = null;
            history = [];
            gameFinished = false;
            rondaActual = 0;
            numPlayersSelect.value = '3';
            puntuacionFinalInput.value = '200';
            setupNames();
            statusMessage.textContent = '';
            newRoundBtn.disabled = false;
            scoreButton.disabled = false;
            undoButton.disabled = false;
            resetScoresBtn.disabled = false;
        }

        restartGameBtn.addEventListener('click', restartGame);
        resetGameBtn.addEventListener('click', restartGame);

        // ============================================================
        //  CARGAR ESTADO AL INICIAR
        // ============================================================
        if (!loadState()) {
            setupScreen.style.display = 'block';
            gameScreen.style.display = 'none';
        }

    })();
    </script>

</body>
</html>
